<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping & Cart</title>

    <link rel="stylesheet" href="cart.css">
</head>
<body>
    <h1>Shopping & Cart</h1>

<!-- Product List -->
<div id="products">
    <div class="product">
<img src="./img/necklace1.jpg" alt="Coconut Necklace!" width="400" height="100">
        <h3>Coconut Turtle Necklace</h3>
        <p>£10</p>
        <button onclick="addToCart('Coconut Turtle Necklace', 10)">Add to Cart</button>
    </div>
    <div class="product">
<img src="./img/necklace2.jpg" alt="A Nice Necklace!" width="400" height="100">
        <h3>Moon Necklace</h3>
        <p>£15</p>
        <button onclick="addToCart('Moon Necklace', 15)">Add to Cart</button>
    </div>
</div>

<!-- Cart -->
<div class="cart">
    <h2>Your Cart</h2>
    <table id="cart-table">
        <thead>
            <tr>
                <th>Item</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <h3 id="grand-total">Grand Total: $0</h3>
</div>
 <br><br>
    <button onclick="window.location.href='index.html'">Back Home</button>
    <script src="cart.js"></script>
</body>
</html>
