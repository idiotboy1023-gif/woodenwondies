<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h2>Enter The Form</h2><br>
    <form action="wooden-wonders.html" method="get"><br>

        <label for="Username">Username:</label><br>
        <input type="text" id="Username" name="Username" placeholder="Enter your Username" required><br>

        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" placeholder="Enter Your Name" required><br>

                <label for="age">Age:</label><br>
        <input type="number" id="Age" name="Age" placeholder="Enter age" min="1" max="99" required><br>


        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email" required><br>


        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="4" placeholder="Write your message here..." required></textarea><br>


        <input type="submit" value="Submit">
    </form>
<script src="the-form.js"></script>
</body>
</html>
