<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Form</title>
</head>
<body>
    <h2>Enter The Form</h2>

    <!-- Name input -->
    <input type="text" id="nameInput" placeholder="Enter your Name" 
           pattern="[A-Za-z\s]{2,50}" title="Only letters, min 2 characters" required>
    <br><br>

    <!-- Age input -->
    <input type="number" id="ageInput" placeholder="Enter your Age" 
           min="1" max="120" required>
    <br><br>

    <!-- Gmail input -->
    <input type="email" id="gmailInput" placeholder="Enter your Gmail" 
           pattern="[a-z0-9._%+-]+@gmail\.com" title="Must be a valid Gmail address" required>
    <br><br>

    <!-- Buttons -->
    <button onclick="saveData()">Save</button>
    <button onclick="loadData()">Load</button>
<br><br>
    <button onclick="window.location.href='index.html'">Back Home</button>

    <p id="output"></p>

    <script src="the-form.js"></script>
</body>
</html>
